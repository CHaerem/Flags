<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Flag Display</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='css/styles.css') }}"
		/>
	</head>
	<body>
		<div class="container">
			<div id="loading-container" class="loading">
				<div class="spinner"></div>
			</div>

			<div id="content-container" style="display: none">
				<!-- Flag change form -->
				<div id="flag-changer" class="flag-changer">
					<h2>Change Flag</h2>
					<div class="form-group">
						<label for="country-input">Enter Country Name:</label>
						<input
							type="text"
							id="country-input"
							placeholder="e.g., Norway, Japan, Brazil"
						/>
					</div>
					<button id="change-flag-btn" class="btn">Update Flag</button>
					<div id="status-message" class="status-message hidden"></div>
				</div>

				<div class="card">
					<div class="flag-info">
						<div id="emoji"></div>
						<h1 id="country">Loading...</h1>

						<div class="country-info">
							<div class="info-item">
								<div class="info-label">Capital:</div>
								<div id="capital" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Population:</div>
								<div id="population" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Region:</div>
								<div id="region" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Languages:</div>
								<div id="languages" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Currency:</div>
								<div id="currency" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Time Zones:</div>
								<div id="timezones" class="info-value">-</div>
							</div>
						</div>

						<p id="timestamp"></p>
					</div>
				</div>
			</div>
		</div>

		<footer>
			Created by Christopher Hærem |
			<a href="https://github.com/CHaerem">GitHub</a>
		</footer>

		<!-- Load JavaScript modules in correct order -->
		<script src="{{ url_for('static', filename='js/api.js') }}"></script>
		<script src="{{ url_for('static', filename='js/ui.js') }}"></script>
		<script src="{{ url_for('static', filename='js/app.js') }}"></script>
	</body>
</html>
