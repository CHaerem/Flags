<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Flag Display</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--primary-color: #3498db;
				--secondary-color: #f8f9fa;
				--text-color: #333;
				--background-color: #f5f7fa;
				--card-color: #ffffff;
				--border-color: #e0e0e0;
				--shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				--muted-text: #888;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					--primary-color: #61a5e4;
					--secondary-color: #2c3e50;
					--text-color: #f5f5f5;
					--background-color: #1a1a2e;
					--card-color: #2c2c44;
					--border-color: #3f3f5f;
					--shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
					--muted-text: #aaa;
				}
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: "Nunito", sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background-color: var(--background-color);
				padding: 0;
				margin: 0;
			}

			.container {
				width: 100%;
				max-width: 600px;
				margin: 2rem auto;
				padding: 1rem;
			}

			.card {
				background: var(--card-color);
				border-radius: 8px;
				overflow: hidden;
				box-shadow: var(--shadow);
				margin-bottom: 1.5rem;
			}

			.flag-info {
				padding: 1.5rem;
			}

			#emoji {
				font-size: 4rem;
				margin: 0.5rem 0 1rem;
				display: block;
				text-align: center;
			}

			h1 {
				font-size: 2rem;
				margin-bottom: 1rem;
				color: var(--primary-color);
				text-align: center;
			}

			.country-info {
				margin: 1.5rem 0;
			}

			.info-item {
				display: flex;
				margin-bottom: 0.75rem;
				border-bottom: 1px solid var(--border-color);
				padding-bottom: 0.75rem;
			}

			.info-label {
				flex: 0 0 40%;
				font-weight: 600;
				color: var(--primary-color);
			}

			.info-value {
				flex: 0 0 60%;
			}

			#timestamp {
				text-align: right;
				font-size: 0.85rem;
				color: var(--muted-text);
				margin-top: 1.5rem;
			}

			.loading {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 200px;
				width: 100%;
			}

			.spinner {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				border: 3px solid var(--border-color);
				border-top: 3px solid var(--primary-color);
				animation: spin 1s linear infinite;
			}

			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}

			footer {
				text-align: center;
				padding: 1.5rem;
				margin-top: 2rem;
				font-size: 0.85rem;
				color: var(--muted-text);
			}

			/* New styles for the flag changer form */
			.flag-changer {
				background: var(--card-color);
				border-radius: 8px;
				overflow: hidden;
				box-shadow: var(--shadow);
				margin-bottom: 1.5rem;
				padding: 1.5rem;
			}

			.form-group {
				margin-bottom: 1rem;
			}

			.form-group label {
				display: block;
				margin-bottom: 0.5rem;
				font-weight: 600;
				color: var(--primary-color);
			}

			.form-group input {
				width: 100%;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				background-color: var(--secondary-color);
				color: var(--text-color);
			}

			.btn {
				background-color: var(--primary-color);
				color: white;
				border: none;
				padding: 0.75rem 1.5rem;
				border-radius: 4px;
				cursor: pointer;
				font-weight: 600;
				transition: background-color 0.2s;
			}

			.btn:hover {
				background-color: #2980b9;
			}

			.status-message {
				margin-top: 1rem;
				padding: 0.75rem;
				border-radius: 4px;
				text-align: center;
			}

			.success {
				background-color: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}

			.error {
				background-color: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}

			.hidden {
				display: none;
			}

			@media (max-width: 480px) {
				h1 {
					font-size: 1.5rem;
				}
				#emoji {
					font-size: 3.5rem;
				}
				.flag-info {
					padding: 1rem;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div id="loading-container" class="loading">
				<div class="spinner"></div>
			</div>

			<div id="content-container" style="display: none">
				<!-- Flag change form - new section -->
				<div class="flag-changer">
					<h2>Change Flag</h2>
					<div class="form-group">
						<label for="country-input">Enter Country Name:</label>
						<input
							type="text"
							id="country-input"
							placeholder="e.g., Norway, Japan, Brazil"
						/>
					</div>
					<button id="change-flag-btn" class="btn">Update Flag</button>
					<div id="status-message" class="status-message hidden"></div>
				</div>

				<div class="card">
					<div class="flag-info">
						<div id="emoji"></div>
						<h1 id="country">Loading...</h1>

						<div class="country-info">
							<div class="info-item">
								<div class="info-label">Capital:</div>
								<div id="capital" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Population:</div>
								<div id="population" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Region:</div>
								<div id="region" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Languages:</div>
								<div id="languages" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Currency:</div>
								<div id="currency" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Time Zones:</div>
								<div id="timezones" class="info-value">-</div>
							</div>
						</div>

						<p id="timestamp"></p>
					</div>
				</div>
			</div>
		</div>

		<footer>
			Created by Christopher Hærem |
			<a href="https://github.com/CHaerem">GitHub</a>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
