<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Flag Display</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--primary-color: #3498db;
				--secondary-color: #f8f9fa;
				--text-color: #333;
				--border-color: #e0e0e0;
				--shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: "Nunito", sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background-color: #f5f7fa;
				padding: 0;
				margin: 0;
			}

			.container {
				width: 100%;
				max-width: 600px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				padding: 1.5rem 0;
				background-color: var(--primary-color);
				color: white;
				margin-bottom: 2rem;
				box-shadow: var(--shadow);
			}

			.card {
				background: white;
				border-radius: 8px;
				overflow: hidden;
				box-shadow: var(--shadow);
				margin-bottom: 1.5rem;
			}

			.flag-container {
				position: relative;
				width: 100%;
				padding-top: 66.67%; /* 3:2 aspect ratio for most flags */
				overflow: hidden;
				background-color: #f1f1f1;
			}

			#flag-img {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				object-fit: cover;
				transition: transform 0.3s ease;
			}

			#flag-img:hover {
				transform: scale(1.03);
			}

			.flag-info {
				padding: 1.5rem;
			}

			#emoji {
				font-size: 3.5rem;
				margin: 1rem 0;
				display: block;
			}

			h1 {
				font-size: 1.8rem;
				margin-bottom: 1rem;
				color: var(--primary-color);
			}

			.country-info {
				margin: 1.5rem 0;
			}

			.info-item {
				display: flex;
				margin-bottom: 0.75rem;
				border-bottom: 1px solid var(--border-color);
				padding-bottom: 0.75rem;
			}

			.info-label {
				flex: 0 0 40%;
				font-weight: 600;
				color: #666;
			}

			.info-value {
				flex: 0 0 60%;
			}

			#timestamp {
				text-align: right;
				font-size: 0.85rem;
				color: #888;
				margin-top: 1.5rem;
			}

			.loading {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 200px;
				width: 100%;
			}

			.spinner {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				border: 3px solid #f3f3f3;
				border-top: 3px solid var(--primary-color);
				animation: spin 1s linear infinite;
			}

			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}

			footer {
				text-align: center;
				padding: 1.5rem;
				margin-top: 2rem;
				font-size: 0.85rem;
				color: #888;
			}

			@media (max-width: 480px) {
				h1 {
					font-size: 1.5rem;
				}
				#emoji {
					font-size: 3rem;
				}
				.flag-info {
					padding: 1rem;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Flag Display</h1>
			<p>Current flag on your E-Ink display</p>
		</header>

		<div class="container">
			<div id="loading-container" class="loading">
				<div class="spinner"></div>
			</div>

			<div id="content-container" style="display: none">
				<div class="card">
					<div class="flag-container">
						<img id="flag-img" src="" alt="Country Flag" />
					</div>
					<div class="flag-info">
						<div id="emoji"></div>
						<h1 id="country">Loading...</h1>

						<div class="country-info">
							<div class="info-item">
								<div class="info-label">Capital:</div>
								<div id="capital" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Population:</div>
								<div id="population" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Region:</div>
								<div id="region" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Languages:</div>
								<div id="languages" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Currency:</div>
								<div id="currency" class="info-value">-</div>
							</div>
							<div class="info-item">
								<div class="info-label">Time Zones:</div>
								<div id="timezones" class="info-value">-</div>
							</div>
						</div>

						<p id="timestamp"></p>
					</div>
				</div>
			</div>
		</div>

		<footer>
			Created by Christopher Hærem |
			<a href="https://github.com/CHaerem">GitHub</a>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
